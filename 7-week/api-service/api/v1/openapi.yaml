openapi: 3.1.0
info:
  title: "Weather Tracker API 🌦️"
  version: 1.0.0
  description: |
    HTTP API для трекинга погоды по городам пользователя.

    Сервис позволяет создавать пользователей, добавлять города в список отслеживания, получать актуальную погоду по этим городам и просматривать историю погодных запросов.
    Данные пользователей, городов и истории хранятся в PostgreSQL. Актуальная погода берётся через внутренний gateway-сервис (он ходит во внешний Open-Meteo API) и кешируется в Redis, чтобы лишний раз не дергать gateway.
servers:
  - url: http://localhost:8080
    description: Локальный сервер разработки
security:
  - JWT: []
tags:
  - name: "Сервис ⚙️"
    description: Служебные ручки для проверки состояния API
  - name: "Аутентификация 🔐"
    description: Регистрация, вход и получение access token
  - name: "Профиль 👤"
    description: Получение и изменение профиля текущего пользователя
  - name: "Пользователи 👥"
    description: Операции с пользователями (только для админов)
  - name: "Города 🏙️"
    description: Управление городами, за которыми следит пользователь
  - name: "Погода 🌦️"
    description: Получение погоды по всем отслеживаемым городам пользователя
paths:
  /health:
    $ref: './paths/health.yaml#/health'
  /api/v1/auth/register:
    $ref: './paths/auth.yaml#/register'
  /api/v1/auth/login:
    $ref: './paths/auth.yaml#/login'
  /api/v1/auth/logout:
    $ref: './paths/auth.yaml#/logout'
  /api/v1/users:
    $ref: './paths/users.yaml#/users'
  /api/v1/users/me:
    $ref: './paths/profile.yaml#/me'
  /api/v1/users/{id}:
    $ref: './paths/users.yaml#/userByID'
  /api/v1/cities:
    $ref: './paths/cities.yaml#/cities'
  /api/v1/cities/{city_id}:
    $ref: './paths/cities.yaml#/cityByID'
  /api/v1/weather:
    $ref: './paths/weather.yaml#/weather'
  /api/v1/weather/history:
    $ref: './paths/weather.yaml#/history'

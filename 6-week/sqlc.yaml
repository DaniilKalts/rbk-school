version: "2"

sql:
  - engine: "postgresql"
    schema: "database/migrations"
    queries: "database/queries"
    gen:
      go:
        package: "sqlc"
        out: "internal/adapters/database/postgres/sqlc"
        sql_package: "pgx/v5"
        emit_empty_slices: true
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "timestamptz"
            go_type:
              import: "time"
              type: "Time"
          - db_type: "timestamptz"
            nullable: true
            go_type:
              import: "time"
              type: "Time"
              pointer: true
          - db_type: "pg_catalog.numeric"
            go_type: "float64"
